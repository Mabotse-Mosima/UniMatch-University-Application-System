name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: CI/CD Pipeline - Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "ASSIGNMENT_12/requirements.txt" ]; then
            pip install -r ASSIGNMENT_12/requirements.txt
          fi

      - name: Run tests
        run: |
          cd ASSIGNMENT_12
          python -m pytest tests/ -v

  build-artifact:
    name: CI/CD Pipeline - Build Artifact
    runs-on: ubuntu-latest

    needs: test

    # ONLY run when code is merged/pushed to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create artifact directory
        run: |
          mkdir -p artifact
          cp -r ASSIGNMENT_12 artifact/
          echo "Build date: $(date)" > artifact/build-info.txt
          echo "Commit: ${{ github.sha }}" >> artifact/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unimatch-artifact
          path: artifact/
          retention-days: 30